<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swim Feels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <!--
    🔤 ШРИФТ: Manrope — официальный шрифт Swim Feels по брендбуку
  -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════════════════
       🎨 ЦВЕТА — фирменная палитра по брендбуку Swim Feels
    ══════════════════════════════════════════════════════ */
    :root {
      /* Основные цвета */
      --navy:      #072D64;   /* Глубокий синий — заголовки, тёмный текст */
      --blue:      #5FBEF0;   /* Голубой — основной акцент */
      --teal:      #5FEBF0;   /* Ярко-бирюзовый */
      --light-blue:#9BD7FF;   /* Светло-голубой — фоны секций */
      --aqua:      #C1F9FA;   /* Нежный аквамарин — самый светлый фон */

      /* Дополнительные акценты */
      --pink:      #FF4191;   /* Розовый — яркие акценты */
      --yellow:    #FAFF55;   /* Жёлтый — акцент на тёмном фоне */

      /* Нейтральные */
      --white:     #ffffff;
      --text-gray: #5a6a80;   /* Второстепенный текст */
      --border:    rgba(7,45,100,0.12);

      /* Шрифт */
      --font: 'Manrope', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--aqua); color: var(--navy); font-family: var(--font); overflow-x: hidden; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--light-blue); }
    ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 2px; }

    /* ══ КНОПКИ ══════════════════════════════════════════ */
    .btn-primary {
      padding: 14px 36px;
      background: var(--navy);
      color: var(--white);
      border: none;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-primary:hover { background: var(--blue); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(95,190,240,0.3); }
    .btn-primary:active { transform: translateY(-1px); }

    .btn-outline {
      padding: 14px 36px;
      background: transparent;
      color: var(--navy);
      border: 2px solid var(--navy);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-outline:hover { background: var(--navy); color: var(--white); transform: translateY(-3px); }

    .btn-pink {
      padding: 14px 36px;
      background: var(--pink);
      color: var(--white);
      border: none;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-pink:hover { opacity: 0.85; transform: translateY(-3px); box-shadow: 0 8px 24px rgba(255,65,145,0.3); }

    /* ══ НАВИГАЦИЯ ════════════════════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 72px;
      background: rgba(193,249,250,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 20px;
      font-weight: 800;
      color: var(--navy);
      cursor: pointer; border: none; background: none;
      font-family: var(--font);
    }
    .nav-logo span { color: var(--pink); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      color: var(--navy);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 1; }
    .nav-cta {
      padding: 10px 28px;
      background: var(--navy);
      color: var(--white);
      border: none;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .nav-cta:hover { background: var(--blue); }

    /* ══ ЯЗЫКИ ═══════════════════════════════════════════ */
    .nav-languages {
      display: flex; gap: 6px; align-items: center;
    }
    .lang-btn {
      padding: 8px 12px;
      background: transparent;
      color: var(--navy);
      border: 1px solid var(--navy);
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn:hover { background: var(--navy); color: var(--white); }
    .lang-btn.active { background: var(--navy); color: var(--white); box-shadow: 0 2px 8px rgba(7,45,100,0.2); }

    /* ══ СЕКЦИИ ══════════════════════════════════════════ */
    section { padding: 100px 48px; }
    .section-tag {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--pink);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: clamp(40px, 5vw, 72px);
      font-weight: 800;
      line-height: 1.05;
      color: var(--navy);
      margin-bottom: 40px;
    }
    .section-title span { color: var(--pink); }

    /* Декоративные SVG-иконки паттерна */
    .pattern-icons {
      display: flex; gap: 16px; margin-bottom: 32px; opacity: 0.25;
    }
    .pattern-icons svg { width: 36px; height: 36px; fill: var(--navy); }

    /* ══ HERO ════════════════════════════════════════════ */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center;
      padding: 120px 48px 80px;
      background: var(--navy);
      position: relative; overflow: hidden;
    }
    /* Декоративные круги на фоне */
    .hero::before {
      content: '';
      position: absolute; top: -100px; right: -100px;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: rgba(95,190,240,0.15);  
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute; bottom: -80px; left: 30%;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(95,235,240,0.1);
      pointer-events: none;
    }
    /* ══ HERO IMAGES FIX ════════════════════ */
    .hero img { max-width: 180px; height: auto; display: block; margin: 0 0 22px 0; }
    .hero img[style*="position:absolute"] { display: none; }
    .hero-tag {
      font-size: 12px; font-weight: 600;
      letter-spacing: 3px; color: var(--teal);
      text-transform: uppercase; margin-bottom: 20px;
    }
    .hero-title {
      font-size: clamp(64px, 10vw, 140px);
      font-weight: 800;
      line-height: 0.95;
      color: var(--white);
    }
    .hero-title .accent {
      color: var(--yellow);
    }
    .hero-content { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
    .hero-left { display: flex; flex-direction: column; }
    .hero-right { display: flex; align-items: center; justify-content: flex-end; }
    .hero-sub {
      margin-top: 28px; max-width: 520px;
      color: rgba(255,255,255,0.7);
      font-size: 17px; font-weight: 400; line-height: 1.7;
    }
    .hero-actions { margin-top: 44px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .hero-actions .btn-primary { background: var(--yellow); color: var(--navy); }
    .hero-actions .btn-primary:hover { background: var(--teal); }
    .hero-actions .btn-outline { color: var(--white); border-color: rgba(255,255,255,0.4); }
    .hero-actions .btn-outline:hover { background: rgba(255,255,255,0.1); color: var(--white); }
    
    .hero-nav-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; width: 100%; }
    .btn-nav {
      padding: 12px 24px;
      background: transparent;
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.4);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-nav:hover { background: rgba(255,255,255,0.1); color: var(--white); transform: translateY(-2px); }
    
    /* ══ STATS ═════════════════════════════════════════ */
    .hero-stats { display: flex; gap: 56px; flex-wrap: wrap; align-items: center; position: absolute; right: 48px; bottom: 100px; }
    .stat { text-align: left; }
    .stat-num { font-size: 64px; font-weight: 800; color: var(--yellow); line-height: 1; min-width: 180px; font-variant-numeric: tabular-nums; display: inline-block; }
    .stat-label { font-size: 18px; color: rgba(255,255,255,0.7); font-weight: 600; margin-top: 8px; letter-spacing: 0.5px; }
    
    /* ══ POOLS ═════════════════════════════════════════ */
    #pools { background: var(--light-blue); }
    .pools-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .pool-card {
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .pool-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(7,45,100,0.15); }
    .pool-image {
      width: 100%; aspect-ratio: 16/10;
      background: var(--aqua);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .pool-image img { width: 100%; height: 100%; object-fit: cover; }
    .pool-body { padding: 24px; flex: 1; display: flex; flex-direction: column; gap: 12px; }
    .pool-name { font-size: 18px; font-weight: 800; color: var(--navy); }
    .pool-address { font-size: 13px; color: var(--text-gray); font-weight: 600; }
    .pool-desc { font-size: 13px; color: var(--text-gray); line-height: 1.6; flex: 1; }
    .pool-btn {
      padding: 12px;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 100px;
      font-family: var(--font);
      font-size: 12px; font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .pool-btn:hover { background: var(--blue); }

    /* ══ ABOUT ════════════════════════════════════════════ */
    #about { background: var(--white); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
    .about-text p { color: var(--text-gray); font-size: 16px; line-height: 1.8; margin-bottom: 20px; }
    .about-visual {
      background: var(--aqua);
      border-radius: 24px;
      height: 420px;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .about-visual img { width: 100%; height: 100%; object-fit: cover; border-radius: 24px; }
    .about-visual-placeholder {
      font-size: 100px; font-weight: 800;
      color: var(--navy); opacity: 0.15;
      user-select: none;
    }

    /* ══ VALUES — блок ценностей ══════════════════════════ */
    #values { background: var(--light-blue); }
    .values-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }
    .value-card {
      background: var(--white);
      border-radius: 20px;
      padding: 32px 24px;
    }
    .value-icon { margin-bottom: 16px; min-height:64px; display:flex; align-items:center; }
    .value-title { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
    .value-desc { font-size: 14px; color: var(--text-gray); line-height: 1.6; }

    /* ══ SERVICES ════════════════════════════════════════ */
    #services { background: var(--aqua); }
    .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .service-card {
      background: var(--white);
      border-radius: 20px;
      padding: 36px 32px;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
      border: 2px solid transparent;
    }
    .service-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(7,45,100,0.12); border-color: var(--blue); }
    .service-num { font-size: 12px; font-weight: 700; color: var(--pink); letter-spacing: 2px; margin-bottom: 20px; }
    .service-title { font-size: 24px; font-weight: 800; color: var(--navy); margin-bottom: 12px; }
    .service-desc { color: var(--text-gray); font-size: 14px; line-height: 1.7; }
    .service-arrow { margin-top: 28px; color: var(--navy); font-size: 22px; transition: transform 0.2s; display: inline-block; }
    .service-card:hover .service-arrow { transform: translateX(8px); }

    /* ══ WORK ════════════════════════════════════════════ */
    #work { background: var(--navy); }
    #work .section-tag { color: var(--teal); }
    #work .section-title { color: var(--white); }
    .work-list { border-top: 1px solid rgba(255,255,255,0.1); }
    .work-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      cursor: pointer; transition: padding 0.3s;
    }
    .work-item:hover { padding-left: 16px; }
    .work-item-left { display: flex; align-items: center; gap: 28px; }
    .work-num { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.3); letter-spacing: 2px; width: 28px; }
    .work-name { font-size: 32px; font-weight: 800; color: var(--white); transition: color 0.2s; }
    .work-item:hover .work-name { color: var(--yellow); }
    .work-tags { display: flex; gap: 8px; }
    .work-tag { padding: 4px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 100px; font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 600; }
    .work-arrow { color: rgba(255,255,255,0.3); font-size: 20px; transition: color 0.2s; }
    .work-item:hover .work-arrow { color: var(--yellow); }

    /* ══ SHOP / COACHES ══════════════════════════════════ */
    #shop { background: var(--light-blue); }
    #merch { background: var(--aqua); }
    .coaches-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .coach-card {
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .coach-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(7,45,100,0.15); }
    .coach-avatar {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--aqua);
      display: block;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .coach-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      margin: 0;
      padding: 0;
      border: none;
    }
    .coach-avatar-placeholder { font-size: 64px; font-weight: 800; color: var(--navy); opacity: 0.2; }
    .coach-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .coach-role { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--pink); text-transform: uppercase; }
    .coach-name { font-size: 22px; font-weight: 800; color: var(--navy); line-height: 1.1; }
    .coach-specialty { font-size: 13px; color: var(--text-gray); font-weight: 600; }
    .coach-exp { font-size: 12px; color: var(--text-gray); }
    .coach-bio { font-size: 13px; color: var(--text-gray); line-height: 1.6; margin-top: 8px; flex: 1; }
    .coach-price { font-size: 15px; font-weight: 800; color: var(--navy); margin-top: 12px; }
    .coach-btn {
      margin: 0 20px 20px;
      padding: 12px;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 100px;
      font-family: var(--font);
      font-size: 13px; font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      text-align: center;
    }
    .coach-btn:hover { background: var(--pink); }

    /* ══ CONTACT ═════════════════════════════════════════ */
    #contact { background: var(--white); }
    .contact-wrap { display: grid; grid-template-columns: 1fr; gap: 80px; }
    .contact-info p { color: var(--text-gray); font-size: 16px; line-height: 1.8; margin-bottom: 36px; }
    .contact-detail { margin-bottom: 16px; }
    .contact-detail-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--pink); text-transform: uppercase; margin-bottom: 4px; }
    .contact-detail-value { font-size: 16px; font-weight: 600; color: var(--navy); }
    .contact-benefits {
      list-style: none;
      display: grid;
      gap: 12px;
      margin: -8px 0 32px;
    }
    .contact-benefits li {
      font-size: 16px;
      font-weight: 700;
      color: var(--navy);
    }
    
    /* Clickable contact links */
    .contact-link {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      padding: 2px 0;
      border-bottom: 2px solid transparent;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: inline-block;
    }
    .contact-link:hover {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }
    .contact-link:active {
      opacity: 0.8;
    }
    .contact-phone-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
      color: var(--white);
      border-radius: 999px;
      font-weight: 700;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.24);
      border-bottom: none;
    }
    .contact-phone-link:hover {
      color: var(--white);
      background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
      border-bottom-color: transparent;
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(37, 99, 235, 0.32);
    }
    .contact-phone-link svg {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      fill: currentColor;
    }
    .contact-qr-heading {
      margin: 28px 0 18px;
      font-size: 16px;
      font-weight: 700;
      color: var(--navy);
    }
    .contact-qr-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 220px));
      gap: 20px;
      align-items: start;
    }
    .contact-qr-item {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .contact-qr-code {
      width: 100%;
      max-width: 220px;
      height: auto;
      padding: 8px;
      background: var(--white);
      border: 2px solid rgba(37, 99, 235, 0.28);
      border-radius: 16px;
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.12);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .contact-qr-code:hover {
      transform: translateY(-3px);
      border-color: rgba(37, 99, 235, 0.52);
      box-shadow: 0 18px 36px rgba(37, 99, 235, 0.18);
    }
    .contact-qr-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--navy);
    }
    .contact-spots {
      margin-top: 26px;
      font-size: 14px;
      font-weight: 700;
      color: var(--pink);
    }
    .contact-form { display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--navy); text-transform: uppercase; opacity: 0.6; }
    .form-input, .form-textarea {
      background: var(--aqua);
      border: 2px solid transparent;
      color: var(--navy);
      padding: 14px 18px;
      font-family: var(--font);
      font-size: 15px; font-weight: 500;
      outline: none;
      border-radius: 12px;
      transition: border-color 0.2s;
      resize: none;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--blue); }
    .form-textarea { height: 140px; }
    .form-error { font-size: 11px; color: var(--pink); font-weight: 600; }

    /* ══ МОДАЛКА ═════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(7,45,100,0.6);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    .modal {
      background: var(--white);
      border-radius: 24px;
      max-width: 540px; width: 100%;
      padding: 48px; position: relative;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      max-height: 90vh;
      overflow-y: auto;
    }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
    .modal-close {
      position: absolute; top: 20px; right: 20px;
      background: var(--aqua); border: none;
      color: var(--navy); width: 36px; height: 36px;
      border-radius: 50%; font-size: 18px; cursor: pointer;

    const detailsHTML = item.details ? `<div class="modal-details">${Object.entries(item.details).map(([k,v])=>k && v ? `<div class="modal-detail-row"><span class="modal-detail-key">${k}</span><span class="modal-detail-val">${v}</span></div>` : '').join('')}</div>` : '';
    
    const galleryHTML = galleryFolders ? `
      <div class="modal-gallery" style="display:none;">
        <div class="gallery-folders">
          ${galleryFolders.map((folder, i)=>`
            <button class="gallery-folder" data-folder-index="${i}">
              <span class="gallery-folder-cover">
                <img src="${folder.photos[0]}" alt="${folder.name}">
              </span>
              <span class="gallery-folder-body">
                <span class="gallery-folder-title">${folder.name}</span>
                <span class="gallery-folder-count">${folder.photos.length} фото</span>
              </span>
            </button>
          `).join('')}
        </div>
        <div class="gallery-photo-view" style="display:none;">
          <button class="gallery-back">← Назад</button>
          <div class="gallery-folder-view-title"></div>
          <div class="gallery-image-container" style="position:relative;width:100%;padding-bottom:100%;background:#f0f0f0;border-radius:8px;overflow:hidden;margin-bottom:16px;">
            <img class="gallery-image" src="${galleryFolders[0].photos[0]}" alt="Gallery" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;">
          </div>
          <div style="display:flex;gap:8px;justify-content:space-between;margin-bottom:16px;">
          <button class="gallery-prev" style="flex:1;padding:10px;background:#f0f0f0;border:none;border-radius:6px;cursor:pointer;font-weight:600;transition:all 0.3s cubic-bezier(0.16, 1, 0.3, 1);font-family:var(--font);">← Предыдущее</button>
            <span class="gallery-counter" style="flex:1;display:flex;align-items:center;justify-content:center;font-weight:600;">1 / ${galleryFolders[0].photos.length}</span>
          <button class="gallery-next" style="flex:1;padding:10px;background:#f0f0f0;border:none;border-radius:6px;cursor:pointer;font-weight:600;transition:all 0.3s cubic-bezier(0.16, 1, 0.3, 1);font-family:var(--font);">Следующее →</button>
          </div>
        </div>
      </div>
    ` : '';
    
    const instagramHTML = item.instagram ? `
      <div class="modal-instagram" style="display:none;text-align:center;padding:40px 20px;">
        <p style="margin-bottom:16px;font-size:16px;">Посмотрите больше фотографий и видео на нашем Instagram</p>
        <a href="${item.instagram}" target="_blank" style="display:inline-flex;align-items:center;gap:8px;background:#c13584;color:#fff;padding:12px 32px;border-radius:50px;text-decoration:none;font-weight:600;cursor:pointer;transition:all 0.3s cubic-bezier(0.16, 1, 0.3, 1);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
          Перейти в Instagram →
        </a>
      </div>
    ` : '';
    
    const overlay = el('div', 'modal-overlay', `
      <div class="modal">
        <button class="modal-close">✕</button>
        <div class="modal-num">${item.num || '—'}</div>
        <div class="modal-title">${item.title || item.name}</div>
        <div class="modal-desc">${item.desc}</div>
        
        <div class="modal-tabs" style="display:flex;gap:12px;margin:24px 0;border-bottom:2px solid #f0f0f0;padding-bottom:0;">
          <button class="modal-tab-details" style="padding:12px 0;background:none;border:none;font-weight:600;cursor:pointer;border-bottom:3px solid #0d2461;color:#0d2461;flex:1;transition:all 0.35s cubic-bezier(0.16, 1, 0.3, 1);font-family:var(--font);">Информация</button>
          ${galleryFolders ? '<button class="modal-tab-gallery" style="padding:12px 0;background:none;border:none;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:#999;flex:1;transition:all 0.35s cubic-bezier(0.16, 1, 0.3, 1);font-family:var(--font);">Галерея</button>' : ''}
          ${item.instagram ? '<button class="modal-tab-instagram" style="padding:12px 0;background:none;border:none;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:#999;flex:1;transition:all 0.35s cubic-bezier(0.16, 1, 0.3, 1);font-family:var(--font);">Instagram</button>' : ''}
        </div>
        
        <div class="modal-details-view">${detailsHTML}</div>
        ${galleryHTML}
        ${instagramHTML}
        
        <button class="btn-primary modal-cta" style="margin-top:28px">Связаться с нами →</button>
      </div>
    `);
    
    const modal = overlay.querySelector('.modal');
    overlay.querySelector('.modal-close').onclick = () => overlay.remove();
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    overlay.querySelector('.modal-cta').onclick = () => { overlay.remove(); scrollTo('contact'); };
    
    // Tab switching
    const detailsTab = overlay.querySelector('.modal-tab-details');
    const galleryTab = overlay.querySelector('.modal-tab-gallery');
    const instagramTab = overlay.querySelector('.modal-tab-instagram');
    
    const detailsView = overlay.querySelector('.modal-details-view');
    const galleryView = overlay.querySelector('.modal-gallery');
    const instagramView = overlay.querySelector('.modal-instagram');
    
    function switchTab(newView) {
      currentView = newView;
      
      // Fade out current view
      [detailsView, galleryView, instagramView].forEach(v => { 
        if(v) {
          v.style.opacity = '0';
          v.style.pointerEvents = 'none';
        }
      });
      
      // Update tabs
      [detailsTab, galleryTab, instagramTab].forEach(tab => { 
        if(tab) {
          tab.style.borderBottomColor = 'transparent';
          tab.style.color = '#999';
        }
      });
      
      // Show selected view and highlight tab after fade
      setTimeout(() => {
        [detailsView, galleryView, instagramView].forEach(v => { if(v) v.style.display = 'none'; });
        
        if (newView === 'details') {
          if(detailsView) {
            detailsView.style.display = 'block';
            setTimeout(() => {
              detailsView.style.opacity = '1';
              detailsView.style.pointerEvents = 'auto';
            }, 10);
          }
          detailsTab.style.borderBottomColor = '#0d2461';
          detailsTab.style.color = '#0d2461';
        } else if (newView === 'gallery') {
          if(galleryView) {
            galleryView.style.display = 'block';
            setTimeout(() => {
              galleryView.style.opacity = '1';
              galleryView.style.pointerEvents = 'auto';
            }, 10);
          }
          if(galleryTab) {
            galleryTab.style.borderBottomColor = '#0d2461';
            galleryTab.style.color = '#0d2461';
          }
        } else if (newView === 'instagram') {
          if(instagramView) {
            instagramView.style.display = 'block';
            setTimeout(() => {
              instagramView.style.opacity = '1';
              instagramView.style.pointerEvents = 'auto';
            }, 10);
          }
          if(instagramTab) {
            instagramTab.style.borderBottomColor = '#0d2461';
            instagramTab.style.color = '#0d2461';
          }
        }
      }, 200);
    }
    
    // Add initial opacity styles
    [detailsView, galleryView, instagramView].forEach(v => {
      if(v) {
        v.style.transition = 'opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1)';
        v.style.opacity = '1';
        v.style.pointerEvents = 'auto';
      }
    });
    if(galleryView) galleryView.style.display = 'none';
    if(instagramView) instagramView.style.display = 'none';
    
    if (galleryTab) {
      galleryTab.onclick = () => switchTab('gallery');
      galleryTab.onmouseenter = function() { this.style.color = '#0d2461'; };
      galleryTab.onmouseleave = function() { if(currentView !== 'gallery') this.style.color = '#999'; };
    }
    if (instagramTab) {
      instagramTab.onclick = () => switchTab('instagram');
      instagramTab.onmouseenter = function() { this.style.color = '#0d2461'; };
      instagramTab.onmouseleave = function() { if(currentView !== 'instagram') this.style.color = '#999'; };
    }
    if (detailsTab) {
      detailsTab.onclick = () => switchTab('details');
      detailsTab.onmouseenter = function() { this.style.color = '#0d2461'; };
      detailsTab.onmouseleave = function() { if(currentView !== 'details') this.style.color = '#0d2461'; };
    }
    
    // Gallery navigation
    if (galleryFolders) {
      const foldersView = overlay.querySelector('.gallery-folders');
      const photoView = overlay.querySelector('.gallery-photo-view');
      const folderTitle = overlay.querySelector('.gallery-folder-view-title');
      const imgElement = overlay.querySelector('.gallery-image');
      const counter = overlay.querySelector('.gallery-counter');
      const prevBtn = overlay.querySelector('.gallery-prev');
      const nextBtn = overlay.querySelector('.gallery-next');
      const backBtn = overlay.querySelector('.gallery-back');
      
      const getCurrentPhotos = () => galleryFolders[currentFolderIndex ?? 0].photos;
      
      const updateGallery = () => {
        const photos = getCurrentPhotos();
        imgElement.style.opacity = '0';
        setTimeout(() => {
          imgElement.src = photos[currentGalleryIndex];
          counter.textContent = `${currentGalleryIndex + 1} / ${photos.length}`;
          imgElement.style.opacity = '1';
        }, 175);
      };

      const openFolder = (folderIndex) => {
        currentFolderIndex = folderIndex;
        currentGalleryIndex = 0;
        folderTitle.textContent = galleryFolders[folderIndex].name;
        foldersView.style.display = 'none';
        photoView.style.display = 'block';
        updateGallery();
      };

      overlay.querySelectorAll('.gallery-folder').forEach(btn => {
        btn.onclick = () => openFolder(+btn.dataset.folderIndex);
      });

      backBtn.onclick = () => {
        currentFolderIndex = null;
        photoView.style.display = 'none';
        foldersView.style.display = 'grid';
      };
      
      prevBtn.onclick = () => {
        const photos = getCurrentPhotos();
        currentGalleryIndex = (currentGalleryIndex - 1 + photos.length) % photos.length;
        updateGallery();
      };
      prevBtn.onmouseenter = function() { this.style.background = '#e0e0e0'; this.style.transform = 'scale(0.98)'; };
      prevBtn.onmouseleave = function() { this.style.background = '#f0f0f0'; this.style.transform = 'scale(1)'; };
      
      nextBtn.onclick = () => {
        const photos = getCurrentPhotos();
        currentGalleryIndex = (currentGalleryIndex + 1) % photos.length;
        updateGallery();
      };
      nextBtn.onmouseenter = function() { this.style.background = '#e0e0e0'; this.style.transform = 'scale(0.98)'; };
      nextBtn.onmouseleave = function() { this.style.background = '#f0f0f0'; this.style.transform = 'scale(1)'; };
    }
    
    document.body.appendChild(overlay);
    const onKey = (e) => { if (e.key==='Escape') { overlay.remove(); window.removeEventListener('keydown', onKey); } };
    window.addEventListener('keydown', onKey);
  }

  function showToast(msg) {
    const t = el('div', 'toast', `<span class="toast-icon">✓</span><span class="toast-text">${msg}</span>`);
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  setTimeout(() => {
    const statNums = document.querySelectorAll('.stat-num');
    if (statNums[0]) {
      function animateCounter(el, from, to, suffix, duration) {
  const start = performance.now();
  function update(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const ease = progress < 0.5
      ? 4 * progress * progress * progress
      : 1 - Math.pow(-2 * progress + 2, 3) / 2;
    const current = Math.round(from + (to - from) * ease);
    el.textContent = current.toLocaleString('ru-RU') + suffix;
    if (progress < 1) {
      requestAnimationFrame(update);
    }
  }
  requestAnimationFrame(update);
}

// Циклическая анимация: редкое и плавное небольшое движение счётчика
function cyclicAnimation(currentValue = 10031) {
  const riseAmount = 8 + Math.random() * 18;
  const maxValue = currentValue + riseAmount;
  const riseDuration = 14000 + Math.random() * 6000;

  animateCounter(statNums[0], currentValue, maxValue, '', riseDuration);

  setTimeout(() => {
    const fallAmount = 3 + Math.random() * 8;
    const minValue = Math.max(10031, maxValue - fallAmount);
    const fallDuration = 6000 + Math.random() * 3000;

    animateCounter(statNums[0], maxValue, minValue, '', fallDuration);

    setTimeout(() => {
      cyclicAnimation(minValue);
    }, 12000 + Math.random() * 8000);
  }, riseDuration + 4000 + Math.random() * 3000);
}

cyclicAnimation();
    }
  }, 300);
